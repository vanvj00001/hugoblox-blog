    <section class="cf ph3 ph5-l pv3 pv4-l f4 tc-l center measure-wide lh-copy nested-links mid-gray"><h1 id="自述">自述</h1>
<p>余号老梵，此地乃随笔之所，以录人生之思、生活之悟。</p>
<p>余本理工之人，及至大学，忽开天目，始觉今人所执科技，不过沧海一粟。以有限之学，欲窥宇宙之全貌，犹管中窥豹，可见一斑。自癸酉年（一九九三）本科卒业，遂别简朴之日，踏入丰饶跌宕之旅。其间辗转多端，历种种际遇，得诸多机缘，于浮沉中渐有所悟，略窥天机一线。</p>
<p>余生愿将此心付与有缘，分享大道践行之点滴体悟。</p>
