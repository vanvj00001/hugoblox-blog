余号老梵，此地乃随笔之所，以录人生之思、生活之悟。
余本理工之人，治地理之学。然多年习练功法，疏而不辍，及至大学，忽开天目，始觉今人所执科技，不过沧海一粟。以有限之学，欲窥宇宙之全貌，犹管中窥豹，可见一斑。
自癸酉年（一九九三）本科卒业，遂别简朴之日，踏入丰饶跌宕之旅。其间辗转多端，历种种际遇，得诸多机缘，于浮沉中渐有所悟，略窥天机一线。
