    <h1 id="神话传说">《神话传说》</h1>
<p>有客自远方来，幸会幸会。老朽遍历诸邦，采撷神话，名曰&quot;传说轩&quot;。邀君共坐，瀹茗展卷，且听异闻。此间无妄语，但有梵天创世、湿婆舞灭，亦有希腊雷霆、北欧寒霜。每国一话，每话一智——或问轮回之苦，或叹英雄之勇，或窥人心之幽。君若得暇，不妨驻足，同参万民之梦，共悟千古之机。一盏茶凉，一界破空，诸神低语，惟心知耳。</p>
