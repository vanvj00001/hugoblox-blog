{{ define "main" }}
<div class="td-content">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
</div>
{{ if .Pages }}
<ul class="td-blog-posts-list">
  {{ range .Pages.ByDate.Reverse }}
  <li class="td-blog-posts-list__item">
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
{{ else }}
<p>No posts for this tag.</p>
{{ end }}
{{ end }}
