baseURL = "https://vanvj00001.github.io/hugoblox-blog/"
title = "神话传说"
theme = "ananke"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
disablPathToLower = true
enableGitInfo = false

[markup]
  [markup.goldmark.renderer]
    unsafe = true
    hardWrap = true

[params]
  BookSection = "posts"
  custom_css = ["home-typography.css"]
  description = "神话传说博客"
  date_format = "2006-01-02"
  ShowPostNavLinks = false
  images = ["favicon.png"]
  profilePicture = "images/profile.jpg"
  [params.ananke]
    show_recent_posts = false
    [params.ananke.home]
      content_alignment = "left"
  

  
  [params.toha]
    enableThemeToggle = true
    defaultTheme = "auto"
    
[menu]
  [[menu.main]]
    name = '博客'
    url = '/posts/'
    weight = 1
  [[menu.main]]
    name = '标签'
    url = '/tags/'
    weight = 2
  [[menu.main]]
    name = '分类'
    url = '/categories/'
    weight = 3
  [[menu.main]]
    name = '关于'
    url = '/about/'
    weight = 4
