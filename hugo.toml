baseURL = "https://vanvj00001.github.io/hugoblox-blog/"
title = "神话传说"
theme = "PaperMod"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
disablPathToLower = true
enableGitInfo = false

[markup]
  [markup.goldmark.renderer]
    unsafe = true

[params]
  BookSection = "posts"
  description = "神话传说博客"
  images = ["favicon.png"]
  
  [params.author]
    name = "老梵"
  
  [params.toha]
    enableThemeToggle = true
    defaultTheme = "auto"
    
[menu]
  [[menu.main]]
    name = '博客'
    url = '/posts/'
    weight = 1
  [[menu.main]]
    name = '标签'
    url = '/tags/'
    weight = 2
  [[menu.main]]
    name = '分类'
    url = '/categories/'
    weight = 3
  [[menu.main]]
    name = '关于'
    url = '/about/'
    weight = 4

